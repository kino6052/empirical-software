<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empirical Software</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fg: #1a1a1a;
      --bg: #fafafa;
      --muted: #666;
      --border: #e0e0e0;
      --accent: #1a1a1a;
      --radius: 4px;
      --space: 1.5rem;
      --max-w: 800px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Typography */
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: var(--space); letter-spacing: -0.01em; }
    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: calc(var(--space) * 0.75); }
    h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: calc(var(--space) * 0.5); }

    .text {
      color: var(--muted);
      margin-bottom: var(--space);
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      .nav { flex-wrap: wrap; gap: 0.6rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/dist/main.js"></script>
</body>
</html>
