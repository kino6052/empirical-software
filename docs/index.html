<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empirical Software</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fg: #1a1a1a;
      --bg: #fafafa;
      --muted: #666;
      --border: #e0e0e0;
      --accent: #1a1a1a;
      --radius: 4px;
      --space: 1.5rem;
      --max-w: 800px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Typography */
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: var(--space); letter-spacing: -0.01em; }
    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: calc(var(--space) * 0.75); }
    h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: calc(var(--space) * 0.5); }

    .text {
      color: var(--muted);
      margin-bottom: var(--space);
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      .nav { flex-wrap: wrap; gap: 0.6rem; }
    }
  

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .main {
      flex: 1;
      max-width: var(--max-w);
      width: 100%;
      margin: 0 auto;
      padding: calc(var(--space) * 2) var(--space);
    }
  

    .nav {
      display: flex;
      gap: 1rem;
      padding: var(--space);
      border-bottom: 1px solid var(--border);
      max-width: var(--max-w);
      width: 100%;
      margin: 0 auto;
    }
    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav a:hover, .nav a.active {
      color: var(--fg);
    }
  

    .link {
      color: var(--fg);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  

    .hero {
      padding: calc(var(--space) * 3) 0;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: var(--space);
    }
    .hero .text {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 560px;
    }
    .hero .btn {
      margin-top: calc(var(--space) * 1.5);
    }
  

    .text {
      color: var(--muted);
      margin-bottom: var(--space);
    }
  

    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      background: var(--fg);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
  

  </style>
</head>
<body>
  <div id="app"><div class="app"><nav class="nav"><a href="#" class="link" data-page="home">Home</a><a href="#" class="link" data-page="services">Services</a><a href="#" class="link" data-page="about">About</a><a href="#" class="link" data-page="blog">Blog</a><a href="#" class="link" data-page="contact">Contact</a></nav><main class="main"><section class="section"><div class="container"><div class="hero"><h1>Empirical Software</h1><p class="text">We build software that keeps delivering — sprint after sprint, year after year.</p><p class="text">No mire. No slowdown. Just sustained velocity.</p><button class="btn">See how →</button></div></div></section></main></div></div>
  <script type="module" src="./main.eygt9x1h.js"></script>
</body>
</html>
